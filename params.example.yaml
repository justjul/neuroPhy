  DialogWindow: 1         # Dialog on left
  Window: 2               # Plots on right
  Foverlap: false        # Separate subplots
  colormap: hot          # Colormap for matrices
  ChosenCell: 1          # Default selected cell
  FpoolCell: false       # Don't pool cells
  ChosenVarXorigin: Beh
  ChosenVarXname: XPercent
  ChosenVarYorigin: Beh
  ChosenVarYname: YPercent
  ChosenVarCorigin: Beh
  ChosenVarCname: none
  
  # Available plot types
  PlotObjList:
    - [Raster, true, PlotRaster, null, null]
    - [Raster_mat, false, PlotRaster_matdisp, null, null]
    - [fast1Dmap, true, PlotFast1Dmaps, null, null]
  
  # Dialog subset parameters
